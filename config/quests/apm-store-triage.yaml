# DEJ quest definition (source of truth for player UI copy and scoring).
# UI-facing copy is Japanese; identifiers and config keys stay English.
#
# Narrative arc, quest 1 of 4: orientation / triage. The player opens the
# store-frontend APM Service Page and recognizes that the ERROR rate is clearly
# abnormal. Latency is intentionally NOT a correct answer here: the data plane
# runs under constant load (no "before" baseline), so on the Service Page
# overview the obviously-wrong signal is errors. High latency is only evident
# once you sort the Resource list, which is the subject of quests 3-4.
# Telemetry source: the always-on Storedog + Locust data plane on EC2
# (see docs/data-plane.md), env:dej.
id: apm-store-triage
module: apm-troubleshoot-workflow
scenario: storedog-frontend

title: Service Page Triage
display_title: Service Page で異常に気づく

# Symptom only: do not reveal which signal is abnormal (that is the answer).
description: >-
  store-frontend の APM Service Page を開き、サービスの状態を確認してください。
  リクエスト数・エラー数・レイテンシ（応答時間）のグラフを見て、明らかに
  問題が起きていると判断できる指標はどれですか？

starting_point: >-
  Datadog の APM Service Page で store-frontend(env:dej)を開くと、リクエスト数・
  エラー数・レイテンシのグラフが確認できます。明らかに問題が起きている指標を
  探してください。

# Ordered answer fields. multi_choice is graded as an unordered set.
answer_fields:
  - key: abnormal_signals
    type: multi_choice
    prompt: リクエスト数・エラー数・レイテンシ（応答時間）のうち、Service Page の概観で明らかに問題だと判断できるものをすべて選んでください。
    label: 問題だと判断できる指標
    options:
      - value: rate
        label: リクエスト数 (Rate)
      - value: errors
        label: エラー数 (Errors)
      - value: latency
        label: レイテンシ (Duration / p95)
    expected:
      - errors
    points: 300
    required: true

scoring:
  # Sum of field points (300) + speed_bonus.max (200). Floored at 0 for display.
  max_score: 500
  hint_penalties:
    - -20
    - -40
  speed_bonus:
    max: 200
    window_seconds: 900

hints:
  - label: ヒント 1
    text: >-
      Service Page の上部にある時系列グラフ（Requests / Errors / Latency）を
      確認してください。明らかにおかしいと分かる指標はどれですか？
  - label: ヒント 2
    text: >-
      Service Page の概観で明らかに問題だと分かるのは Errors（エラー数）です。
      レイテンシは Resource 一覧を見ないと判断しづらく、リクエスト数（Rate）自体は
      問題ではありません。
