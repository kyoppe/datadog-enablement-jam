# DEJ quest definition (source of truth for player UI copy and scoring).
# UI-facing copy is Japanese; identifiers and config keys stay English.
#
# Narrative arc, quest 3 of 4: investigate the latency surfaced in the triage
# quest. Confirmed from APM (env:dej): Spree::ProductsController#show is the
# highest-p95 endpoint on store-frontend, and its time is dominated by the
# downstream ads-service GET /ads call (~78% of the request in inspected
# traces). Telemetry: always-on Storedog + Locust data plane on EC2.
id: apm-product-ads
module: apm-troubleshoot-workflow
scenario: storedog-product-ads

title: Slow Product Page Investigation
display_title: 商品ページ遅延の調査

# Symptom only: do not name the slow resource / downstream service (answers).
description: >-
  トリアージで見つけたレイテンシ悪化を掘り下げます。store-frontend の Service Page で
  Resource ごとのレイテンシを確認し、最も遅いページを特定してください。さらにその
  Trace Sample（フレームグラフ）から、遅延の主因となっている下流サービスと、その
  呼び出しを突き止めてください。

# Pre-filtered Datadog deep link: store-frontend APM service page, env:dej.
datadog_path: /apm/services/store-frontend?env=dej

starting_point: >-
  「APM Service Page を開く」リンク（store-frontend / env:dej で絞り込み済み）を開き、
  Resource 一覧でレイテンシ（p95）が最も高い Resource を確認してください。

answer_fields:
  - key: slow_resource
    prompt: Resource 一覧で p95 が最も高い（最も遅い）Resource はどれですか？
    label: 最も遅い Resource
    expected: Spree::ProductsController#show
    points: 200
    required: true
  - key: root_cause_service
    prompt: その Resource の遅延の大半を占めている下流サービスはどれですか？
    label: 主因となっている下流サービス
    expected: ads-service
    points: 300
    required: true
  - key: downstream_call
    prompt: その下流サービスへの呼び出し（Operation / Resource 名）は何ですか？
    label: 下流への呼び出し
    expected: GET /ads
    points: 100
    required: true

scoring:
  # Sum of field points (600) + speed_bonus.max (200). Floored at 0 for display.
  max_score: 800
  hint_penalties:
    - -50
    - -100
    - -150
  speed_bonus:
    max: 200
    window_seconds: 900

hints:
  - label: ヒント 1
    text: >-
      store-frontend の APM Service Page の Resource 一覧で、p95 が最も高い Resource を
      探してください。
  - label: ヒント 2
    text: >-
      その Resource の Trace Sample を開き、フレームグラフで下流 Span の Duration を
      比較してください。特定の下流サービスの呼び出しが支配的なはずです。
  - label: ヒント 3
    text: >-
      最も遅い Resource は Spree::ProductsController#show（商品詳細ページ）で、支配的な
      下流は ads-service（GET /ads）です。広告取得の応答がリクエスト時間の大半を占めます。
