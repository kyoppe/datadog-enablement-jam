# DEJ scenario definition.
# Describes how the data plane should behave to produce the intended APM view.
id: apm-slow-checkout-inventory
module: apm-service-page-basics
quest: apm-slow-checkout

description: >-
  checkout-service のレイテンシが、下流の inventory-service が遅いことにより
  悪化しているシナリオ。APM Service Page でレイテンシ悪化を確認でき、Trace Sample
  では inventory-service の Span Duration が長いことが見えるようにする。

# Datadog tags applied to all generated telemetry.
tags:
  dej_module: apm-service-page-basics
  dej_scenario: apm-slow-checkout-inventory
  # dej_session is injected at runtime from the session id (make scenario SESSION=...).

# Service topology generated by this scenario.
topology:
  entrypoint: frontend-service
  edges:
    - from: frontend-service
      to: checkout-service
    - from: checkout-service
      to: payment-service
    - from: checkout-service
      to: inventory-service

# The resource (endpoint) that exhibits degraded latency.
degraded_resource: POST /api/checkout/confirm

# Fault injection: which service is slow and by how much.
fault_injection:
  service: inventory-service
  type: added_latency
  # Extra latency in milliseconds (overridable via INVENTORY_EXTRA_LATENCY_MS).
  extra_latency_ms: 800

# Expected outcome for facilitators to validate the scenario is working.
expected_signal:
  degraded_service: checkout-service
  root_cause_service: inventory-service
  visible_in:
    - APM Service Page latency (checkout-service)
    - Resource breakdown (POST /api/checkout/confirm)
    - Trace sample downstream span (inventory-service)
