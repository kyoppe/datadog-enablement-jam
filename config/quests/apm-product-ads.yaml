# DEJ quest definition (source of truth for player UI copy and scoring).
# UI-facing copy is Japanese; identifiers and config keys stay English.
#
# Narrative arc, quest 3 of 4: investigate the latency surfaced in the triage
# quest. Confirmed from APM (env:dej): the product detail page
# (Spree::ProductsController#show, p95 ~7.0s) has its time dominated by the
# downstream ads-service GET /ads call (~78% of the request in inspected
# traces). Because ProductsController#show and HomeController#index have nearly
# tied p95 (~7.0s vs ~6.9s), this quest NAMES the page instead of asking the
# player to pick the single slowest resource; the dominant cause is asked as a
# guided multiple-choice. Telemetry: always-on Storedog + Locust data plane.
id: apm-product-ads
module: apm-troubleshoot-workflow
scenario: storedog-product-ads

title: Slow Product Page Investigation
display_title: 商品ページ遅延の調査

# Symptom only: do not name the downstream service / call (answers).
description: >-
  Service Page で見つけたレイテンシ悪化を掘り下げます。商品詳細ページ
  (Spree::ProductsController#show)の Resource / Endpoint ページから Trace 一覧を開き、
  1つの Trace のフレームグラフを見て、リクエスト時間の大半を占めている主因を
  突き止めてください。

starting_point: >-
  APM の store-frontend Service Page(env:dej)で、商品詳細ページ
  (Spree::ProductsController#show)の Resource / Endpoint ページを開き、Trace 一覧から
  1つの Trace のフレームグラフを確認してください。

answer_fields:
  - key: main_cause
    type: multi_choice
    prompt: 商品詳細ページ(Spree::ProductsController#show)の Resource / Endpoint ページを開き、Trace 一覧から1つの Trace のフレームグラフを開いて、リクエスト時間の大半を占めているものを選んでください。
    label: 遅延の主因
    options:
      - value: downstream_ads
        label: 下流 ads-service への呼び出し
      - value: downstream_discounts
        label: 下流 discounts-service への呼び出し
      - value: db_postgres
        label: postgres のクエリ
      - value: image
        label: 画像配信(Spree::Image / アセット)
      - value: self_cpu
        label: store-frontend 自身の処理
    expected:
      - downstream_ads
    points: 300
    required: true
  - key: downstream_call
    prompt: その下流サービスの呼び出し(Operation / Resource 名)は何ですか？
    label: 下流への呼び出し
    expected: GET /ads
    points: 300
    required: true

scoring:
  # Sum of field points (600) + speed_bonus.max (200). Floored at 0 for display.
  max_score: 800
  hint_penalties:
    - -20
    - -40
    - -60
  speed_bonus:
    max: 200
    window_seconds: 900

hints:
  - label: ヒント 1
    text: >-
      商品詳細ページ(Spree::ProductsController#show)の Resource / Endpoint ページの
      Trace 一覧から、1つの Trace のフレームグラフを開いてください。
  - label: ヒント 2
    text: >-
      フレームグラフで下流 Span の Duration を比較してください。特定の下流サービスの
      呼び出しが支配的で、DB クエリ自体は短いはずです。
  - label: ヒント 3
    text: >-
      支配的なのは ads-service への呼び出し(GET /ads)です。広告取得の応答が
      リクエスト時間の大半を占めます。
