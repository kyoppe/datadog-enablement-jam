# DEJ quest definition.
# This is the source of truth for the quest shown in the Player UI and for scoring.
# UI-facing copy is Japanese; identifiers and config keys stay English.
#
# Telemetry source: the always-on Storedog (ecommerce-workshop) + Locust data
# plane on EC2 (see docs/data-plane.md). The store-frontend home page is slow
# because the downstream discounts-service issues an N+1 query pattern.
# Service/resource names below are the real names observed in Datadog APM
# (env:dej): store-frontend -> discounts-service.
id: apm-slow-checkout
module: apm-service-page-basics
scenario: storedog-home-discounts-nplus1

# Internal English title.
title: Slow Home Page Investigation
# Japanese display title shown to participants.
display_title: ホームページ遅延の調査

description: >-
  Storedog（EC ストア）の store-frontend で、トップページのレイテンシが悪化しています。
  Datadog APM の Service Page を起点に、RED metrics、Resource Breakdown、下流サービス、
  Trace Sample を順に確認し、遅延の原因となっている下流サービスを特定してください。

# Recommended starting point shown prominently in the Player UI.
starting_point: >-
  まず store-frontend の APM Service Page から調査を開始してください
  （env:dej で絞り込み）。

# Answer fields the player must submit.
answer_fields:
  root_cause_service:
    label: 原因となっている下流サービス
    required: true
  affected_resource:
    label: 影響を受けている Resource / Endpoint
    required: true
  evidence_url:
    label: 根拠となる Datadog URL (任意)
    required: false

# Expected answers. Matching is case-insensitive and trimmed (see scoring.ts).
# store-frontend の最も遅い Resource は Spree::HomeController#index（トップページ）。
# その下流で遅いのは discounts-service（GET /discount の N+1）。
expected:
  root_cause_service: discounts-service
  affected_resource: Spree::HomeController#index

scoring:
  points:
    root_cause_service: 300
    affected_resource: 200
    evidence_url: 100
  # Base (600) + speed_bonus.max (200). Displayed score is floored at 0.
  max_score: 800
  # Wrong answers do not reduce score (CTF-style); they are only counted.
  hint_penalties:
    - -50   # hint 1
    - -100  # hint 2
    - -150  # hint 3
  # Time bonus awarded once when the quest is solved. Decays linearly from
  # `max` down to 0 over `window_seconds` since the player joined.
  speed_bonus:
    max: 200
    window_seconds: 900

hints:
  - label: ヒント 1
    text: store-frontend の APM Service Page で、レイテンシ（p95 など）の悪化を確認してください。
  - label: ヒント 2
    text: >-
      Resource Breakdown で最も遅い Resource（トップページ＝Spree::HomeController#index）を
      特定してください。
  - label: ヒント 3
    text: >-
      その Resource の Trace Sample を開き、下流サービスの Span Duration を比較してください。
      discounts-service の呼び出しが支配的なはずです。
