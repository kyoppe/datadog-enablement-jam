# DEJ quest definition (source of truth for player UI copy and scoring).
# UI-facing copy is Japanese; identifiers and config keys stay English.
#
# Narrative arc, quest 4 of 4: a second latency case. Confirmed from APM
# (env:dej): the home page span Spree::HomeController#index (p95 ~6.9s) spends
# the overwhelming majority of its time in the downstream discounts-service
# GET /discount call (~88% of the request in inspected traces). The postgres
# queries inside discounts-service are each only ~1-6ms, so the root cause is
# the downstream service response, not the DB. Because HomeController#index and
# ProductsController#show have nearly tied p95, this quest NAMES the page rather
# than asking the player to pick the single slowest resource; the dominant cause
# is asked as a guided multiple-choice. Telemetry: always-on Storedog + Locust.
id: apm-home-discounts
module: apm-troubleshoot-workflow
scenario: storedog-home-discounts

title: Slow Home Page Investigation
display_title: ホームページ遅延の調査

# Symptom only: do not name the downstream service / call (answers).
description: >-
  トップページ(Spree::HomeController#index)のレイテンシも悪化しています。
  Resource / Endpoint ページから Trace 一覧を開き、1つの Trace のフレームグラフを見て、
  リクエスト時間の大半を占めている主因を特定してください。なお下流サービス内の
  DB クエリ自体は高速です。

starting_point: >-
  APM の store-frontend Service Page(env:dej)で、トップページ
  (Spree::HomeController#index)の Resource / Endpoint ページを開き、Trace 一覧から
  1つの Trace のフレームグラフを確認してください。

answer_fields:
  - key: main_cause
    type: multi_choice
    prompt: トップページ(Spree::HomeController#index)の Resource / Endpoint ページを開き、Trace 一覧から1つの Trace のフレームグラフを開いて、store-frontend 以外でリクエスト時間の大半を占めているものを選んでください。
    label: 遅延の主因
    options:
      - value: downstream_ads
        label: 下流 ads-service への呼び出し
      - value: downstream_discounts
        label: 下流 discounts-service への呼び出し
      - value: db_postgres
        label: postgres のクエリ
      - value: image
        label: 画像配信(Spree::Image / アセット)
      - value: self_cpu
        label: store-frontend 自身の処理
    expected:
      - downstream_discounts
    points: 300
    required: true
  - key: downstream_call
    prompt: その下流サービスの呼び出し(Operation / Resource 名)は何ですか？
    label: 下流への呼び出し
    expected: GET /discount
    points: 300
    required: true

scoring:
  # Sum of field points (600) + speed_bonus.max (200). Floored at 0 for display.
  max_score: 800
  hint_penalties:
    - -20
    - -40
    - -60
  speed_bonus:
    max: 200
    window_seconds: 900

hints:
  - label: ヒント 1
    text: >-
      トップページ(Spree::HomeController#index)の Resource / Endpoint ページの
      Trace 一覧から、1つの Trace のフレームグラフを開いてください。
  - label: ヒント 2
    text: >-
      フレームグラフで下流サービスの Span Duration を比較してください。下流内の DB クエリ
      自体は速いはずです。
  - label: ヒント 3
    text: >-
      支配的なのは discounts-service への呼び出し(GET /discount)です。サービスの応答
      自体が遅いことが原因です。
